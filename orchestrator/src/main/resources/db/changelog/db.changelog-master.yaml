databaseChangeLog:
  - changeSet:
      id: 1
      author: codex
      changes:
        - createTable:
            tableName: workflow_state
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workflow_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: order_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: correlation_id
                  type: VARCHAR(80)
                  constraints:
                    nullable: false
              - column:
                  name: idempotency_key
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: last_error
                  type: VARCHAR(512)
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: workflow_state
            columnNames: workflow_id
            constraintName: uk_workflow_id
        - addUniqueConstraint:
            tableName: workflow_state
            columnNames: idempotency_key
            constraintName: uk_workflow_idempotency
